version: '3.9'

networks:
  internal:
    external: true

  traefik-public:
    external: true

services:
  frontend:
    container_name: nextjs-app

    build:
      context: .
      target: runner

    environment:
      NODE_ENV: production
      NEXT_TELEMETRY_DISABLED: "1"
      PORT: 3000

    restart: unless-stopped

    security_opt:
      - no-new-privileges:true

    networks:
      - internal
      - traefik-public

    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=traefik-public"

      - "traefik.http.routers.nextjs.rule=Host(`securex.devlooper.co.in`)"
      - "traefik.http.routers.nextjs.entrypoints=web"

      - "traefik.http.services.nextjs.loadbalancer.server.port=3000"

    healthcheck:
      test: [ "CMD-SHELL", "wget --spider -q http://localhost:3000 || exit 1" ]
      interval: 30s
      timeout: 10s
      retries: 3
